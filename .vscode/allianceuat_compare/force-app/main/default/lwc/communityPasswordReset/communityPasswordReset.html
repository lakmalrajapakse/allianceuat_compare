<template >
    <!-- Header -->
    <div style="padding:0.7rem; border-bottom:1px solid #ddd; background:#f4f6f9; text-align:center;">
        <h2 style="margin:0; font-size:1.25rem; color:#16325c;">Reset Community Password</h2>
    </div>

    <!-- Body -->
    <div style="padding:2rem; text-align:center;">
        <p>You're attempting to reset the community password for this contact.</p>
    </div>

    <!-- Footer -->
    <div style="padding:0.7rem; border-top:1px solid #ddd; background:#f4f6f9; text-align:right;">
        <lightning-button 
            variant="neutral" 
            label="Cancel" 
            onclick={handleCancel} 
            class="slds-m-right_small">
        </lightning-button>

        <lightning-button 
            variant="brand" 
            label="Reset Password" 
            onclick={handleReset}>
        </lightning-button>
    </div>
</template>
